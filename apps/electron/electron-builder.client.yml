appId: com.lukilabs.craft-agent.client
productName: Craft Agents Client
copyright: Copyright © 2026 Craft Docs Ltd.

electronVersion: "39.2.7"

afterPack: scripts/afterPack.cjs

directories:
  output: release/client
  buildResources: resources

files:
  - dist/**/*
  - "!dist/renderer/src/**"
  - "!**/*.map"
  - package.json
  - resources/**/*
  - resources/bridge-mcp-server/**/*
  - .client-build/resources/session-mcp-server/**/*
  - .client-build/resources/pi-agent-server/**/*
  - resources/thin-client/profile.json
  - packages/shared/src/unified-network-interceptor.ts
  - packages/shared/src/interceptor-common.ts
  - packages/shared/src/feature-flags.ts
  - packages/shared/src/interceptor-request-utils.ts
  - resources/scripts/**/*
  - resources/bin/markitdown
  - resources/bin/markitdown.cmd
  - resources/bin/pdf-tool
  - resources/bin/pdf-tool.cmd
  - resources/bin/xlsx-tool
  - resources/bin/xlsx-tool.cmd
  - resources/bin/doc-diff
  - resources/bin/doc-diff.cmd
  - resources/bin/img-tool
  - resources/bin/img-tool.cmd
  - resources/bin/docx-tool
  - resources/bin/docx-tool.cmd
  - resources/bin/pptx-tool
  - resources/bin/pptx-tool.cmd
  - resources/bin/ical-tool
  - resources/bin/ical-tool.cmd
  - resources/bin/darwin-arm64/**/*
  - resources/bin/darwin-x64/**/*
  - resources/bin/win32-x64/**/*
  - resources/bin/linux-x64/**/*
  - vendor/bun/**/*
  - vendor/codex/**/*
  - vendor/copilot/**/*
  - "!node_modules/**/*"

extraMetadata:
  main: dist/main.cjs

publish:
  provider: generic
  url: https://agents.craft.do/electron/latest

asar: false

mac:
  category: public.app-category.productivity
  icon: resources/icon.icns
  extendInfo:
    CFBundleIconName: AppIcon
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extraResources:
    - from: node_modules/@anthropic-ai/claude-agent-sdk
      to: app/node_modules/@anthropic-ai/claude-agent-sdk
      filter:
        - "**/*"
        - "!vendor/ripgrep/arm64-linux/**"
        - "!vendor/ripgrep/x64-linux/**"
        - "!vendor/ripgrep/x64-win32/**"
    - from: ../../packages/shared/src/agent/powershell-parser.ps1
      to: app/resources/powershell-parser.ps1
  files:
    - "!**/vendor/codex/linux-*/**"
    - "!**/vendor/codex/win32-*/**"
    - "!**/vendor/copilot/linux-*/**"
    - "!**/vendor/copilot/win32-*/**"
    - "!**/resources/bin/win32-*/**"
    - "!**/resources/bin/linux-*/**"
  artifactName: "Craft-Agent-Client-${arch}.${ext}"

dmg:
  artifactName: "Craft-Agent-Client-${arch}.dmg"
  background: resources/dmg-background.tiff
  icon: resources/icon.icns
  iconSize: 80
  title: "Craft Agents Client"
  contents:
    - x: 130
      y: 200
    - x: 410
      y: 200
      type: link
      path: /Applications
  window:
    width: 540
    height: 380

win:
  icon: resources/icon.ico
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "Craft-Agent-Client-${arch}.${ext}"
  files:
    - "!**/vendor/codex/darwin-*/**"
    - "!**/vendor/codex/linux-*/**"
    - "!**/vendor/copilot/darwin-*/**"
    - "!**/vendor/copilot/linux-*/**"
    - "!**/resources/bin/darwin-*/**"
    - "!**/resources/bin/linux-*/**"
    - "!vendor/bun/**/*"
    - "!vendor/codex/**/*"
    - "!vendor/copilot/**/*"
    - "!**/resources/bin/win32-x64/**"
  extraResources:
    - from: node_modules/@anthropic-ai/claude-agent-sdk
      to: app/node_modules/@anthropic-ai/claude-agent-sdk
      filter:
        - "**/*"
        - "!vendor/ripgrep/arm64-darwin/**"
        - "!vendor/ripgrep/x64-darwin/**"
        - "!vendor/ripgrep/arm64-linux/**"
        - "!vendor/ripgrep/x64-linux/**"
    - from: ../../packages/shared/src/agent/powershell-parser.ps1
      to: app/resources/powershell-parser.ps1
    - from: vendor/bun/bun.exe
      to: vendor/bun/bun.exe
    - from: vendor/codex/win32-x64
      to: app/vendor/codex/win32-x64
    - from: vendor/copilot/win32-x64
      to: app/vendor/copilot/win32-x64
    - from: resources/bin/win32-x64
      to: app/resources/bin/win32-x64

nsis:
  oneClick: true
  perMachine: false
  deleteAppDataOnUninstall: true

linux:
  icon: resources/icon.png
  category: Utility
  maintainer: "Craft Docs Ltd. <support@craft.do>"
  target:
    - target: AppImage
      arch:
        - x64
  artifactName: "Craft-Agent-Client-${arch}.${ext}"
  extraResources:
    - from: node_modules/@anthropic-ai/claude-agent-sdk
      to: app/node_modules/@anthropic-ai/claude-agent-sdk
      filter:
        - "**/*"
        - "!vendor/ripgrep/arm64-darwin/**"
        - "!vendor/ripgrep/x64-darwin/**"
        - "!vendor/ripgrep/x64-win32/**"
    - from: ../../packages/shared/src/agent/powershell-parser.ps1
      to: app/resources/powershell-parser.ps1
  files:
    - "!**/vendor/codex/darwin-*/**"
    - "!**/vendor/codex/win32-*/**"
    - "!**/vendor/copilot/darwin-*/**"
    - "!**/vendor/copilot/win32-*/**"
    - "!**/resources/bin/darwin-*/**"
    - "!**/resources/bin/win32-*/**"
